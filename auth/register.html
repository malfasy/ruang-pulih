<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RuangPulih - Buat akun pemulihan Anda">
    <title>Daftar — RuangPulih</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="auth-page-bg">
    <a href="/" style="position:absolute; top:2rem; left:2rem; display:flex; align-items:center; gap:0.5rem; text-decoration:none; color:#728BA9; font-weight:700; font-size:0.875rem; background:white; padding:0.5rem 1rem; border-radius:999px; box-shadow:0 4px 15px rgba(0,0,0,0.05); z-index:10; transition:all 0.3s;" onmouseover="this.style.transform='translateX(-4px)'" onmouseout="this.style.transform='translateX(0)'">
        <svg style="width:1.25rem;height:1.25rem;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
        Beranda
    </a>
    <!-- Ambient blobs -->
    <div style="position:fixed;top:10%;left:5%;width:30vw;height:30vw;border-radius:50%;background:#DAE3EC;filter:blur(100px);opacity:0.4;pointer-events:none;"></div>
    <div style="position:fixed;bottom:5%;right:10%;width:25vw;height:25vw;border-radius:50%;background:#BAC7B6;filter:blur(90px);opacity:0.3;pointer-events:none;"></div>

    <div class="auth-card">
        <!-- Logo -->
        <div style="text-align:center;margin-bottom:2rem;">
            <div style="display:flex;align-items:center;justify-content:center;gap:0.75rem;margin-bottom:1rem;">
                <img src="/assets/images/Logo.png" alt="RuangPulih Logo" style="height:2.5rem;opacity:0.8;filter:grayscale(0.3);">
                <div style="display:flex;flex-direction:column;">
                    <span style="font-weight:800;font-size:1.5rem;color:#728BA9;line-height:1;">Ruang<span style="color:#A3ACA0;">Pulih</span></span>
                    <span style="font-size:0.55rem;color:#A3ACA0;font-weight:700;margin-top:0.25rem;text-transform:uppercase;letter-spacing:0.1em;">Pasca-Operasi & Rehabilitasi</span>
                </div>
            </div>
            <h1 style="font-size:1.5rem;font-weight:800;color:#5A6C7A;margin:0;">Buat Akun Baru</h1>
            <p style="color:#7F7F7F;font-size:0.875rem;margin-top:0.25rem;font-weight:500;">Mulai perjalanan pemulihan Anda</p>
        </div>

        <!-- Error -->
        <div id="auth-message" class="hidden" style="margin-bottom:1.25rem;padding:0.75rem 1rem;border-radius:0.75rem;font-size:0.875rem;font-weight:600;display:flex;align-items:center;gap:0.5rem;"></div>

        <form id="registerForm" novalidate>
            <!-- Name -->
            <div style="margin-bottom:1.25rem;">
                <label for="name" style="display:block;font-size:0.875rem;font-weight:700;color:#728BA9;margin-bottom:0.5rem;">Nama Lengkap</label>
                <input type="text" id="name" name="name" placeholder="Masukkan nama lengkap" class="auth-input" required>
                <p id="name-error" class="hidden" style="margin-top:0.25rem;font-size:0.75rem;color:#D46A6A;"></p>
            </div>

            <!-- Email -->
            <div style="margin-bottom:1.25rem;">
                <label for="email" style="display:block;font-size:0.875rem;font-weight:700;color:#728BA9;margin-bottom:0.5rem;">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" class="auth-input" required>
                <p id="email-error" class="hidden" style="margin-top:0.25rem;font-size:0.75rem;color:#D46A6A;"></p>
            </div>

            <!-- Password -->
            <div style="margin-bottom:1.25rem;">
                <label for="password" style="display:block;font-size:0.875rem;font-weight:700;color:#728BA9;margin-bottom:0.5rem;">Password</label>
                <div style="position:relative;">
                    <input type="password" id="password" name="password" placeholder="••••••••" class="auth-input" style="padding-right:2.5rem;" required>
                    <button type="button" onclick="togglePassword('password', this)" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:#A3ACA0;cursor:pointer;">
                        <svg style="width:1rem;height:1rem;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                    </button>
                </div>
                <p id="password-error" class="hidden" style="margin-top:0.25rem;font-size:0.75rem;color:#D46A6A;"></p>
                <p style="margin-top:0.25rem;font-size:0.7rem;color:#A3ACA0;">Minimal 6 karakter</p>
            </div>

            <!-- Confirm Password -->
            <div style="margin-bottom:1.5rem;">
                <label for="password_confirm" style="display:block;font-size:0.875rem;font-weight:700;color:#728BA9;margin-bottom:0.5rem;">Konfirmasi Password</label>
                <div style="position:relative;">
                    <input type="password" id="password_confirm" name="password_confirm" placeholder="••••••••" class="auth-input" style="padding-right:2.5rem;" required>
                    <button type="button" onclick="togglePassword('password_confirm', this)" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:#A3ACA0;cursor:pointer;">
                        <svg style="width:1rem;height:1rem;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                    </button>
                </div>
                <p id="password_confirm-error" class="hidden" style="margin-top:0.25rem;font-size:0.75rem;color:#D46A6A;"></p>
            </div>

            <!-- Submit -->
            <button type="submit" id="submitBtn" class="auth-btn">Buat Akun</button>
        </form>

        <!-- Login link -->
        <p style="text-align:center;font-size:0.875rem;color:#7F7F7F;margin-top:1.5rem;font-weight:500;">
            Sudah punya akun?
            <a href="/auth/login.html" style="color:#728BA9;font-weight:700;text-decoration:none;">Masuk</a>
        </p>
    </div>
</div>

<script src="/js/supabase-config.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/validation.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
    if (await requireGuest()) return;

    const form = document.getElementById('registerForm');
    const msgEl = document.getElementById('auth-message');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        msgEl.classList.add('hidden');

        let valid = true;
        valid = validateRequired('name', 'Nama lengkap') && valid;
        valid = validateRequired('email', 'Email') && valid;
        valid = validateEmail('email') && valid;
        valid = validateMinLength('password', 6, 'Password') && valid;
        valid = validateMatch('password', 'password_confirm', 'Konfirmasi password') && valid;
        if (!valid) return;

        submitBtn.disabled = true;
        submitBtn.textContent = 'Memproses...';

        try {
            await signUp(
                document.getElementById('email').value.trim(),
                document.getElementById('password').value,
                document.getElementById('name').value.trim()
            );
            msgEl.classList.remove('hidden');
            msgEl.style.background = 'rgba(163,172,160,0.15)';
            msgEl.style.color = '#5A6C7A';
            msgEl.style.border = '1px solid rgba(163,172,160,0.3)';
            msgEl.innerHTML = '<svg style="width:1rem;height:1rem;flex-shrink:0;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Akun berhasil dibuat! Silakan masuk.';
            submitBtn.textContent = 'Akun Dibuat!';
            setTimeout(() => { window.location.href = '/auth/login.html'; }, 2000);
        } catch (err) {
            msgEl.classList.remove('hidden');
            msgEl.style.background = 'rgba(212,106,106,0.1)';
            msgEl.style.color = '#D46A6A';
            msgEl.style.border = '1px solid rgba(212,106,106,0.2)';
            msgEl.innerHTML = '<svg style="width:1rem;height:1rem;flex-shrink:0;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>' + err.message;
            submitBtn.disabled = false;
            submitBtn.textContent = 'Buat Akun';
        }
    });
});
</script>
</body>
</html>
